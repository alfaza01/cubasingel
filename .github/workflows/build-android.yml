name: Build Android APK

on:
  workflow_dispatch: # Memungkinkan Anda memicu build secara manual kapan saja
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NPM Packages
        run: |
          npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          # Memasukkan build web ke dalam container Android Capacitor
          npx cap add android || echo "Folder Android mungkin sudah ada"
          npx cap copy android
          npx cap sync android

      - name: Build APK (Assemble Release)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KasirCubaSingel-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk
